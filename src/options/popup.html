<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Klikkikuri ⛵</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- POWER -->
    <div id="power">
        <h2 id="site-host"></h2>
        <div>
            <button id="open-options" class="push-button">
                <img class="icon" src="images/icon_gear.svg" height="20" alt="Settings icon">
            </button>
            <input class="conversion-switch hidden" id="extension-enabled" type="checkbox" checked>
            <label class="push-button" for="extension-enabled">&#x23FB;</label>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content main-content">
        <h2 id="statsview-header"></h2>
        <hr>
        <div id="statsview">
            <table id="statistics-grouped-by-clickbaitiness">
                <thead>
                    <tr>
                        <th scope="col"></th>
                        <th scope="col"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr id="clickbaitinessLabel-Extremely-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Very-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Moderately-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Slightly-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Not-Clickbait-at-all">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="content feedbackview hidden">
        <div id="feedbackview-general-feedback">
            <h2 id="feedbackview-general-feedback-header" class="feedbackview-header"></h2>
            <hr>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfmiipCpNLI6HLg1n0cUJhRiicIz3BHcbCH9cll4fX0HRj6-g/viewform?embedded=true" width="640" height="491"></iframe>
        </div>
    </div>

    <div class="content settingsview hidden">
        <h2 id="settingsview-sites-enabled-title" class="settingsview-header"></h2>
        <hr>
        <ul id="sites-enabled-ul">
        </ul>

        <div class="devmode hidden">
            <h2 id="settingsview-devmode-title" class="settingsview-header"></h2>
            <hr>
            <input class="hidden" id="devmode-dumpLinkHash" type="button" value="no-op">
            <label class="push-button" for="devmode-dumpLinkHash">dumpLinkHash</label>

            <input class="hidden" id="devmode-setDebugVisuals" type="checkbox">
            <label class="push-button" for="devmode-setDebugVisuals">setDebugVisuals</label>

            <select class="push-button" title="setTitleDataUrl" id="devmode-setTitleDataUrl">
                <option value="https://raw.githubusercontent.com/Klikkikuri/rahti/refs/heads/main/data.json">Klikkikuri Rahti</option>
            </select>
        </div>
    </div>

    <!-- NAVI[GATION] -->
    <div id="navi">
        <div>
            <input id="navi-main" class="open-home hidden" type="radio" name="navi" checked>
            <label for="navi-main" class="push-button">
                <img class="icon" src="images/icon_home.svg" height="15" alt="Home icon">
            </label>
        </div>

        <div>
            <input id="navi-feedback" class="open-feedbackview hidden" type="radio" name="navi">
            <label for="navi-feedback" class="push-button">
                <img class="icon" src="images/icon_comment.svg" height="15" alt="Comment icon">
            </label>
        </div>

        <div>
            <input id="navi-settings" class="open-settingsview hidden" type="radio" name="navi">
            <label for="navi-settings" class="push-button">
                <img class="icon" src="images/icon_slider.svg" height="15" alt="Slider icon">
            </label>
        </div>
    </div>

    <!-- LOGO -->
    <div id="logo">
        <span>Made with</span>
        <span id="logo-graphics">
            <input class="hidden" id="enable-devmode">
            <label for="enable-devmode">
                <img src="images/klikkihAI_logo_1.png" height="15" alt="Klikkukuri logo">
                <span class="devmode hidden">🤓</span>
            </label>
            <!-- Start of hidden devmode controls list -->
            <input class="hidden" id="copy-link-signatures">
            <label for="copy-link-signatures" class="devmode">🧂</label>
            <!-- End of list -->
        </span>
        <span>by Klikkikuri</span>
    </div>

    <script type="module" src="../utils.js"></script>
    <script type="module" src="../model.js"></script>
    <script type="module" src="popup.js"></script>
    <script type="module" src="../controller.js"></script>
</body>

</html>
