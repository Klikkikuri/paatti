<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- POWER -->
    <div id="power">
        <h2 id="site-host"></h2>
        <div>
            <button id="open-options" class="push-button">
                <img class="icon" src="images/icon_gear.svg" height="20" alt="Settings icon">
            </button>
            <input class="conversion-switch hidden" id="extension-enabled" type="checkbox" checked>
            <label class="push-button" for="extension-enabled">&#x23FB;</label>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content main-content">
        <h2 id="statsview-header"></h2>
        <hr>
        <div id="statsview">
            <table id="statistics-grouped-by-clickbaitiness">
                <thead>
                    <tr>
                        <th scope="col"></th>
                        <th scope="col"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr id="clickbaitinessLabel-Extremely-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Very-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Moderately-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Slightly-Clickbaity">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                    <tr id="clickbaitinessLabel-Not-Clickbait-at-all">
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <th scope="row"></th>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="content feedbackview hidden">
        <h2 id="feedbackview-header" class="feedbackview-header"></h2>
        <hr>
        <div id="feedbackview-conversions-container" style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
            <p id="feedbackview-no-conversions" style="text-align: center; color: #666; font-style: italic;" class="hidden"></p>
            <ul id="feedbackview-conversions-list" style="margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 12px; width: 100%;"></ul>
        </div>

        <template id="feedback-item-template">
            <li class="feedback-item">
                <div class="feedback-orig">
                    <strong class="feedback-orig-label"></strong>
                    <span class="feedback-orig-text"></span>
                </div>
                <div class="feedback-conv">
                    <strong class="feedback-conv-label"></strong>
                    <span class="feedback-conv-text"></span>
                </div>
                
                <hr class="feedback-item-divider">

                <div class="feedback-buttons-container">
                    <button class="push-button feedback-good-btn"></button>
                    <button class="push-button feedback-bad-btn"></button>
                </div>
                
                <div class="feedback-form-container hidden">
                    <div class="feedback-form-row">
                        <input type="text" class="feedback-input">
                        <button class="push-button feedback-submit-btn"></button>
                    </div>
                </div>
            </li>
        </template>
    </div>

    <div class="content settingsview hidden">
        <h2 id="settingsview-status-title" class="settingsview-header"></h2>
        <hr>
        <div style="margin-top: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <label for="settingsview-extension-enabled" id="settingsview-master-switch-label" style="font-weight: bold; cursor: pointer;"></label>
            <input class="toggle" id="settingsview-extension-enabled" type="checkbox">
        </div>

        <h2 id="settingsview-clickbait-level-title" class="settingsview-header"></h2>
        <hr>
        <div style="margin-top: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <label for="settingsview-clickbait-level" id="settingsview-clickbait-level-label" style="font-weight: bold; cursor: pointer;"></label>
                <input id="settingsview-clickbait-level" type="range" min="0" max="4" step="1" value="2" style="width: 45%; height: auto; appearance: auto; background: none; box-shadow: none; cursor: pointer;">
            </div>
            <span id="settingsview-clickbait-level-description" style="font-size: 0.85em; color: #666; text-align: left;"></span>
        </div>

        <h2 id="settingsview-sites-enabled-title" class="settingsview-header"></h2>
        <hr>
        <ul id="sites-enabled-ul">
        </ul>

        <div class="devmode hidden" style="margin-top: 15px;">
            <h2 id="settingsview-devmode-title" class="settingsview-header"></h2>
            <hr>
            <ul style="list-style: none; padding: 0; margin-top: 10px; display: flex; flex-direction: column; gap: 12px; width: 100%;">
                <li style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <span id="settingsview-database-status-title" style="font-weight: bold;"></span>
                        <button id="update-database-btn" class="push-button" style="margin: 0; padding: 6px 12px; min-height: 32px; font-size: 0.9em;"></button>
                    </div>
                    <p id="database-last-updated" style="font-size: 0.85em; color: #666; text-align: left; margin: 0;"></p>
                </li>
                <li style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span id="devmode-dumpLinkHash-label" style="font-weight: bold;"></span>
                    <button id="devmode-dumpLinkHash" class="push-button" style="margin: 0; padding: 6px 12px; min-height: 32px; font-size: 0.9em;"></button>
                </li>
                <li style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <label for="devmode-setDebugVisuals" id="devmode-setDebugVisuals-label" style="font-weight: bold; cursor: pointer;"></label>
                    <input class="toggle" id="devmode-setDebugVisuals" type="checkbox">
                </li>
            </ul>
        </div>
    </div>

    <!-- NAVI[GATION] -->
    <div id="navi">
        <div>
            <input id="navi-main" class="open-home hidden" type="radio" name="navi" checked>
            <label for="navi-main" class="push-button">
                <img class="icon" src="images/icon_home.svg" height="15" alt="Home icon">
            </label>
        </div>

        <div>
            <input id="navi-feedback" class="open-feedbackview hidden" type="radio" name="navi">
            <label for="navi-feedback" class="push-button">
                <img class="icon" src="images/icon_comment.svg" height="15" alt="Comment icon">
            </label>
        </div>

        <div>
            <input id="navi-settings" class="open-settingsview hidden" type="radio" name="navi">
            <label for="navi-settings" class="push-button">
                <img class="icon" src="images/icon_slider.svg" height="15" alt="Slider icon">
            </label>
        </div>
    </div>

    <!-- LOGO -->
    <div id="logo">
        <span>Made with</span>
        <span id="logo-graphics">
            <input class="hidden" id="enable-devmode">
            <label for="enable-devmode">
                <img src="images/klikkihAI_logo_1.png" height="15" alt="Klikkukuri logo">
                <span class="devmode hidden">🤓</span>
            </label>
            <!-- Start of hidden devmode controls list -->
            <input class="hidden" id="copy-link-signatures">
            <label for="copy-link-signatures" class="devmode">🧂</label>
            <!-- End of list -->
        </span>
        <span>by Klikkikuri</span>
    </div>

    <!-- VERSION INFO -->
    <div id="version-info">
        <span id="product-name"></span>
        <span id="product-version"></span>
    </div>

    <script type="module" src="../utils.js"></script>
    <script type="module" src="../model.js"></script>
    <script type="module" src="popup.js"></script>
    <script type="module" src="../controller.js"></script>
</body>

</html>
