<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Klikkikuri ⛵</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- POWER -->
    <div id="power">
        <div>
            <input class="conversion-switch hidden" id="extension-enabled" type="checkbox" checked>
            <label class="push-button" for="extension-enabled">&#x23FB;</label>

        </div>
    </div>

    <!-- CONTENT -->
    <!-- NOTE that id isn't used for the element(s) in order to apply .hidden from JS -->
    <div class="content main-content">
        <h2 id="site-host"></h2>
        <hr>
        <div id="statsview">
            <section>
                <h3 id="statsview-handled-elements-title"></h3>
                <p><b id="statistics-main-header">0</b> <span id="statistics-main-header-filler"></span></p>
                <!--p><b id="statistics-links">0</b> linkkiä yhteensä</p-->
            </section>
            <section>
                <h3 id="statsview-shortcut-controls-title"></h3>
                <div class="shortcut-controls">
                    <input class="conversion-switch hidden" id="shortcut-extension-disabled-current-site" type="checkbox">
                    <label class="push-button" for="shortcut-extension-disabled-current-site"></label>
                </div>
            </section>
        </div>
        <div id="statserror" class="hidden error">
            <p></p>
        </div>
    </div>

    <div id="feedbackview-rate-title" class="content feedbackview hidden">
        <h2 id="feedbackview-rate-title-header" class="feedbackview-header"></h2>
        <hr>
        <p><strong></strong></p>
        <p></p>
        <p><strong></strong></p>
        <p></p>
        <div>
            <div>
                <input id="good" type="radio" name="rating">
                <label for="good"></label>
                <input id="bad" type="radio" name="rating">
                <label for="bad"></label>
            </div>
        </div>
    </div>

    <div class="content settingsview hidden">
        <h2 id="settingsview-sites-enabled-title" class="settingsview-header"></h2>
        <hr>
        <ul id="sites-enabled-ul">
        </ul>

        <div class="devmode hidden">
            <h2 id="settingsview-devmode-title" class="settingsview-header"></h2>
            <hr>
            <input class="hidden" id="devmode-dumpLinkHash" type="button" value="no-op">
            <label class="push-button" for="devmode-dumpLinkHash">dumpLinkHash</label>

            <input class="hidden" id="devmode-setDebugVisuals" type="checkbox">
            <label class="push-button" for="devmode-setDebugVisuals">setDebugVisuals</label>

            <select class="push-button" title="setTitleDataUrl" id="devmode-setTitleDataUrl">
                <option value="https://raw.githubusercontent.com/Klikkikuri/rahti/refs/heads/main/data.json">Klikkikuri Rahti</option>
            </select>
        </div>
    </div>

    <!-- NAVI[GATION] -->
    <div id="navi">
        <!-- NOTE that id isn't used for the element(s) in order to apply .hidden from JS -->
        <button id="navi-main" class="sub-view-transition open-home navi-selected">
            <img class="icon" src="images/icon_home.svg" height="24">
            <span class="label"></span>
            <span class="arrow">❯</span>
        </button>
        <button id="navi-feedback" class="sub-view-transition open-feedbackview">
            <img class="icon" src="images/icon_comment.svg" height="24">
            <span class="label"></span>
            <span class="arrow">❯</span>
        </button>
        <button id="navi-settings" class="sub-view-transition open-settingsview">
            <img class="icon" src="images/icon_slider.svg" height="24">
            <span class="label"></span>
            <span class="arrow">❯</span>
        </button>
    </div>

    <!-- LOGO -->
    <div id="logo">
        <input class="hidden" id="show-devmode-controls" type="checkbox">
        <label for="show-devmode-controls">
            <img src="images/klikkihAI_logo_1.png" height="32" alt="Klikkukuri logo">
            <span class="devmode hidden">🤓</span>
        </label>
        <span>Klikkikuri</span>
    </div>

    <script type="module" src="../utils.js"></script>
    <script type="module" src="../model.js"></script>
    <script type="module" src="view.js"></script>
    <script type="module" src="../controller.js"></script>
</body>

</html>
