<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Klikkikuri ⛵</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- POWER -->
    <div id="power">
        <h2 id="site-host"></h2>
        <div>
            <input class="conversion-switch hidden" id="extension-enabled" type="checkbox" checked>
            <label class="push-button" for="extension-enabled">&#x23FB;</label>
        </div>
    </div>

    <!-- CONTENT -->
    <!-- NOTE that id isn't used for the element(s) in order to apply .hidden from JS -->
    <div class="content main-content">
        <div>
            <h2 id="statsview-header"></h2>
            <hr>
            <div id="statsview">
                <section>
                    <h3 id="statsview-handled-elements-title"></h3>
                    <p><b id="statistics-main-header">0</b> <span id="statistics-main-header-filler"></span></p>
                    <!--p><b id="statistics-links">0</b> linkkiä yhteensä</p-->
                </section>
            </div>
            <div id="statserror" class="hidden error">
                <p></p>
            </div>
        </div>
    </div>

    <div class="content feedbackview hidden">
        <div id="feedbackview-general-feedback">
            <h2 id="feedbackview-general-feedback-header" class="feedbackview-header"></h2>
            <hr>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfmiipCpNLI6HLg1n0cUJhRiicIz3BHcbCH9cll4fX0HRj6-g/viewform?embedded=true" width="640" height="491" frameborder="0" marginheight="0" marginwidth="0"></iframe>
        </div>

        <!--div id="feedbackview-rate-title">
            <h2 id="feedbackview-rate-title-header" class="feedbackview-header"></h2>
            <h3>THIS FORM IS NOT FUNCTIONAL YET</h3>
            <hr>
            <p><strong></strong></p>
            <p></p>
            <p><strong></strong></p>
            <p></p>
            <div>
                <div>
                    <input id="good" type="radio" name="rating">
                    <label for="good"></label>
                    <input id="bad" type="radio" name="rating">
                    <label for="bad"></label>
                </div>
            </div>
        </div-->
    </div>

    <div class="content settingsview hidden">
        <h2 id="settingsview-sites-enabled-title" class="settingsview-header"></h2>
        <hr>
        <ul id="sites-enabled-ul">
        </ul>
    </div>

    <!-- NAVI[GATION] -->
    <div id="navi">
        <!-- NOTE that id isn't used for the element(s) in order to apply .hidden from JS -->
        <div>
            <input id="navi-main" class="open-home hidden" type="radio" name="navi" checked>
            <label for="navi-main" class="push-button">
                <img class="icon" src="images/icon_home.svg" height="15">
            </label>
        </div>

        <div>
            <input id="navi-feedback" class="open-feedbackview hidden" type="radio" name="navi">
            <label for="navi-feedback" class="push-button">
                <img class="icon" src="images/icon_comment.svg" height="15">
            </label>
        </div>

        <div>
        </button>
            <input id="navi-settings" class="open-settingsview hidden" type="radio" name="navi">
            <label for="navi-settings" class="push-button">
                <img class="icon" src="images/icon_slider.svg" height="15">
            </label>
        </div>
    </div>

    <!-- LOGO -->
    <div id="logo">
        <span>Made with</span>
        <input class="hidden" id="enable-devmode" type="checkbox">
        <label for="enable-devmode">
            <img src="images/klikkihAI_logo_1.png" height="15" alt="Klikkukuri logo">
            <span class="devmode hidden">🤓</span>
        </label>
        <span>by Klikkikuri</span>
    </div>

    <script type="module" src="../utils.js"></script>
    <script type="module" src="../model.js"></script>
    <script type="module" src="view.js"></script>
    <script type="module" src="../controller.js"></script>
</body>

</html>
